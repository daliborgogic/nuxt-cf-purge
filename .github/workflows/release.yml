name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Module
        run: pnpm run build

      - name: Debug OIDC
        run: |
          echo "OIDC URL present: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL != '' }}"
          echo "OIDC TOKEN present: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN != '' }}"

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --provenance --registry https://registry.npmjs.org/

